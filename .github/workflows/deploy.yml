name: Poll Private Repo and Build Jekyll

on:
  schedule:
    - cron: '*/5 * * * *' # Check every 5 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }} # Your SSH private key

      - name: Fetch Latest Commit from Private Repo
        id: fetch
        run: |
          LATEST_SHA=$(git ls-remote git@github.com:securitytheatre/source.git main | awk '{print $1}')
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT

      - name: Get Stored SHA
        id: get_stored
        run: |
          STORED_SHA=$(cat ./private_repo_sha.txt 2>/dev/null || echo "")
          echo "stored_sha=$STORED_SHA" >> $GITHUB_OUTPUT

      - name: Update SHA, Build, and Deploy Jekyll
        if: steps.fetch.outputs.latest_sha != steps.get_stored.outputs.stored_sha
        run: |
          # Update the stored SHA
          echo ${{ steps.fetch.outputs.latest_sha }} > private_repo_sha.txt
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add private_repo_sha.txt
          git commit -m "Update private repo SHA to ${{ steps.fetch.outputs.latest_sha }}"
          git push

          # Clone private repo content
          git clone git@github.com:securitytheatre/source.git temp_private
          # Copy Jekyll source files (adjust path as needed)
          rsync -av temp_private/ . --exclude=.git --exclude=private_repo_sha.txt

          # Build the Jekyll site
          gem install bundler
          bundle install
          bundle exec jekyll build
